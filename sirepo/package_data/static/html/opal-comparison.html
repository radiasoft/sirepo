<div class="container-fluid">
  <div class="row">
    <div class="col-md-6 col-xl-4">
      <div data-basic-editor-panel="" data-view-name="trackComparison">
        <div data-ng-if="comparison.showWarning">
          <p class="bg-warning" style="padding: 15px">
            Run the simulation on the Visualization tab to populate the comparison plots.
          </p>
        </div>
      </div>
    </div>
    <div data-ng-if="comparison.showBeamComparison()" data-column-for-aspect-ratio="comparisonAnimation">
      <div data-report-panel="parameterWithLattice" data-model-name="comparisonAnimation"></div>
    </div>
    <div class="clearfix"></div>
    <div data-ng-if="comparison.showPhaseSpaceComparison()"
         data-phase-space-plots=""
         data-hide-frame-selector="1"
         data-longitudinal="z-pz"
    ></div>
  </div>
</div>
